<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="../static/icons/onlook_icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
        <link rel="stylesheet" href="static/css/mobile-reset.css">
<link rel="stylesheet" href="static/css/login/reset_password.css">
    <title>Reset Password - Onlook</title>
    <link rel="stylesheet" href="static/css/responsive-fixed.css">
</head>
<body>



{% include 'includes/loading_screen.html' %}
{% include 'includes/flash_messages.html' %}

    <!--############################################################-->
    <!--###############  R E S E T  P A S S W O R D  ###############-->
    <!--############################################################-->
    <div class="background_frame">
        <div class="login_logo_frame">
            <img src="" alt="">
        </div>
    </div>

    <form action="/reset_pass" method="POST">
        <div class="new_pass_main_frame">
            <div class="new_pass_logo_frame">
                <img src="" alt="">
            </div>


            <!--###############  N E W  P A S S W O R D  ###############-->
            <div class="textbox_frame">
                <div class="new_pass_frame">
                    <label for="new_pass"> New Password</label>
                    <div class="new_pass_box">
                        <input type="password" id="new_pass" name="new_pass" placeholder="Enter New Password" required>
                        <button type="button" class="eye-btn" onclick="togglePass('new_pass', this)" aria-label="Show password">
                            <svg class="eye-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-off-icon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>

                    <ul class="validation-list" id="validationList">
                        <li class="rule" id="rule-length"><span class="rule-icon"></span>At least 8 characters</li>
                        <li class="rule" id="rule-upper"><span class="rule-icon"></span>At least 1 uppercase letter</li>
                        <li class="rule" id="rule-lower"><span class="rule-icon"></span>At least 1 lowercase letter</li>
                        <li class="rule" id="rule-number"><span class="rule-icon"></span>At least 1 number</li>
                        <li class="rule" id="rule-symbol"><span class="rule-icon"></span>At least 1 symbol (!@#$%^&amp;*)</li>
                    </ul>

                    <div class="strength-bar-wrap">
                        <div class="strength-bar" id="strengthBar"></div>
                        <div class="strength-label" id="strengthLabel"></div>
                    </div>
                </div>

                <!--###############  C O N F I R M  P A S S W O R D  ###############-->
                <div class="confirm_new_pass_frame">
                    <label for="confirm_new_pass">Confirm New Password</label> 
                    <div class="confirm_new_pass_box">
                        <input type="password" id="confirm_new_pass" name="confirm_new_pass" placeholder="Confirm New Password" required>
                        <button type="button" class="eye-btn" onclick="togglePass('confirm_new_pass', this)" aria-label="Show confirm password">
                            <svg class="eye-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-off-icon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <span class="match-msg" id="matchMsg"></span>
                </div>
            </div>

            <!--###############  S A V E  B U T T O N ###############-->
            <div class="new_pass_button_frame">
                <button id="" name="save_new_pass" type="submit">SAVE</button>
        </div>
        </div>
    </form>



<script src="static/Javascript/loading_screen.js"></script>
<script>
const passwordInput = document.getElementById('new_pass');
const confirmInput = document.getElementById('confirm_new_pass');
const validationList = document.getElementById('validationList');
const strengthBar = document.getElementById('strengthBar');
const strengthLabel = document.getElementById('strengthLabel');
const matchMsg = document.getElementById('matchMsg');
const saveBtn = document.querySelector('button[name="save_new_pass"]');

saveBtn.disabled = true;

const rules = {
    length: { el: document.getElementById('rule-length'), test: v => v.length >= 8 },
    upper:  { el: document.getElementById('rule-upper'),  test: v => /[A-Z]/.test(v) },
    lower:  { el: document.getElementById('rule-lower'),  test: v => /[a-z]/.test(v) },
    number: { el: document.getElementById('rule-number'), test: v => /[0-9]/.test(v) },
    symbol: { el: document.getElementById('rule-symbol'), test: v => /[^A-Za-z0-9]/.test(v) },
};

const strengthLevels = [
    { label: '',           color: 'transparent', width: '0%'   },
    { label: 'Weak',       color: '#ef4444',      width: '20%'  },
    { label: 'Fair',       color: '#f97316',      width: '40%'  },
    { label: 'Good',       color: '#eab308',      width: '60%'  },
    { label: 'Strong',     color: '#22c55e',      width: '80%'  },
    { label: 'Very Strong',color: '#16a34a',      width: '100%' },
];

function updateSaveBtn() {
    const val = passwordInput.value;
    const allRulesPassed = Object.values(rules).every(r => r.test(val));
    const passwordsMatch = val === confirmInput.value && confirmInput.value !== '';
    saveBtn.disabled = !(allRulesPassed && passwordsMatch);
}

passwordInput.addEventListener('input', () => {
    const val = passwordInput.value;
    validationList.classList.toggle('visible', val.length > 0);

    let passed = 0;
    for (const key in rules) {
        const r = rules[key];
        const ok = r.test(val);
        r.el.className = 'rule ' + (val.length > 0 ? (ok ? 'pass' : 'fail') : '');
        r.el.querySelector('.rule-icon').textContent = ok ? '✓' : '✕';
        if (ok) passed++;
    }

    const level = strengthLevels[passed];
    strengthBar.style.width = level.width;
    strengthBar.style.background = level.color;
    strengthLabel.textContent = level.label;
    strengthLabel.style.color = level.color;

    passwordInput.classList.toggle('valid-input', passed === 5);
    passwordInput.classList.toggle('invalid-input', passed < 5 && val.length > 0);
    checkMatch();
    updateSaveBtn();
});

confirmInput.addEventListener('input', () => {
    checkMatch();
    updateSaveBtn();
});

function checkMatch() {
    const p = passwordInput.value, c = confirmInput.value;
    if (!c) { matchMsg.textContent = ''; confirmInput.classList.remove('valid-input','invalid-input'); return; }
    const ok = p === c;
    matchMsg.textContent = ok ? '✓ Passwords match' : '✕ Passwords do not match';
    matchMsg.style.color  = ok ? '#16a34a' : '#ef4444';
    confirmInput.classList.toggle('valid-input', ok);
    confirmInput.classList.toggle('invalid-input', !ok);
}

function togglePass(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.querySelector('.eye-icon').style.display    = show ? 'none' : '';
    btn.querySelector('.eye-off-icon').style.display = show ? '' : 'none';
}
</script>
</body>
</html>
