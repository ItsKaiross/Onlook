<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="../static/icons/onlook_icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - OnLook</title>
    <link rel="stylesheet" href="/static/css/messages.css">
</head>
<body>
    <div class="messages-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="header-left">
                    <button onclick="history.back()" class="back-btn" title="Back">←</button>
                    <h2>Messages</h2>
                </div>
                <button class="new-message-btn" onclick="openNewMessageModal()">+</button>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Search conversations..." id="search-input">
            </div>
            <div class="conversations-list" id="conversations-list">
                <!-- Conversations will be loaded here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header" id="chat-header" style="display: none;">
                <div class="user-info">
                    <div class="user-details">
                        <h3 id="chat-username"></h3>
                        <span class="status" id="chat-status"></span>
                    </div>
                </div>
            </div>
            
            <div class="messages-area" id="messages-area">
                <div class="no-conversation">
                    <h3>Select a conversation to start messaging</h3>
                </div>
            </div>
            
            <div class="message-input-area" id="message-input-area" style="display: none;">
                <div class="input-container">
                    <input type="text" placeholder="Type a message..." id="message-input">
                    <button onclick="sendMessage()" id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Message Modal -->
    <div class="modal" id="new-message-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Message</h3>
                <span class="close" onclick="closeNewMessageModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" placeholder="Search users..." id="user-search" oninput="searchUsers()">
                <div class="users-list" id="users-list"></div>
            </div>
        </div>
    </div>

    <script>
        window.currentUserId = {{ session.get('accounts_id') if session.get('accounts_id') else 'null' }};
    </script>
    <script src="/static/Javascript/messages.js"></script>
</body>
</html>
