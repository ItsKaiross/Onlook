{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-messages">
      {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">
          {{ message }}
          <span class="flash-close" onclick="this.parentElement.remove()">&times;</span>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<style>
.flash-messages { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 500px; }
.flash-message { padding: 15px 40px 15px 15px; margin: 5px 0; border-radius: 8px; color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; animation: slideIn 0.3s ease-out; }
.flash-success { background: #28a745; }
.flash-error { background: #dc3545; }
.flash-warning { background: #ffc107; color: #212529; }
.flash-info { background: #1A1B41; }
.flash-close { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script>
// Auto-hide flash messages after 5 seconds
setTimeout(function() {
    const flashMessages = document.querySelectorAll('.flash-message');
    flashMessages.forEach(function(message) {
        message.style.animation = 'slideOut 0.3s ease-in';
        setTimeout(function() { message.remove(); }, 300);
    });
}, 5000);
</script>

<style>
@keyframes slideOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
</style>
